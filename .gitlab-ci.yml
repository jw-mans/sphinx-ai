stages:
  - lint
  - test
  - build
  - deploy

# Global variables
# CI variables to set in GitLab → Settings → CI/CD → Variables:
#   DEPLOY_SSH_KEY      — private SSH key for the production server
#   DEPLOY_HOST_KEY     — known_hosts entry (ssh-keyscan <host>)
#   DEPLOY_USER         — SSH login on the production server
#   DEPLOY_HOST         — production server hostname / IP
#   DEPLOY_PATH         — absolute path to the project on the server
#   VITE_API_URL        — public URL the browser uses to reach the backend API
#   FRONTEND_URL        — public URL of the frontend (used for environment link)

variables:
  # Test database (used by GitLab CI postgres service) 
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: sphinx_user
  DB_PASSWORD: sphinx_pass
  DB_NAME: sphinx_test

  # Stub values to satisfy pydantic-settings during tests
  YANDEX_API_KEY: test_key
  YANDEX_API_KEY_ID: test_key_id
  YANDEX_API_MODEL_URI: "gpt://test_catalog/yandexgpt-lite"
  YANDEX_CLOUD_CATALOG_ID: test_catalog_id
  BOT_TOKEN: ""

  # Docker
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend

# LINT

lint-backend:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install --quiet ruff
    - ruff check backend/src/
  rules:
    - changes:
        - backend/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint-frontend:
  stage: lint
  image: node:20-alpine
  cache:
    key: frontend-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run lint
    - npx tsc --noEmit
  rules:
    - changes:
        - frontend/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# TEST

test-backend:
  stage: test
  image: python:3.11-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: $DB_USER
    POSTGRES_PASSWORD: $DB_PASSWORD
    POSTGRES_DB: $DB_NAME
  before_script:
    - cd backend
    - pip install --quiet -r requirements.txt -r requirements-test.txt
  script:
    - pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    when: always
    reports:
      junit: backend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    expire_in: 1 week
  rules:
    - changes:
        - backend/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# BUILD  (only on default branch)

.docker-build:
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-backend:
  extends: .docker-build
  stage: build
  script:
    - >
      docker build
      --target prod
      --cache-from $IMAGE_BACKEND:latest
      --build-arg BUILDKIT_INLINE_CACHE=1
      -t $IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA
      -t $IMAGE_BACKEND:latest
      ./backend
    - docker push $IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_BACKEND:latest

build-frontend:
  extends: .docker-build
  stage: build
  script:
    - >
      docker build
      --target prod
      --cache-from $IMAGE_FRONTEND:latest
      --build-arg BUILDKIT_INLINE_CACHE=1
      --build-arg VITE_API_URL=$VITE_API_URL
      -t $IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA
      -t $IMAGE_FRONTEND:latest
      ./frontend
    - docker push $IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE_FRONTEND:latest

# DEPLOY  (manual trigger on default branch)

deploy-production:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - install -m 600 /dev/null ~/.ssh/id_rsa
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
    - printf '%s\n' "$DEPLOY_HOST_KEY" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        set -e
        cd $DEPLOY_PATH
        docker compose pull
        docker compose up -d --remove-orphans
        docker image prune -f
      "
  environment:
    name: production
    url: $FRONTEND_URL
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
