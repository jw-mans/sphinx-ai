groups:
  - name: sphinx_backend
    rules:
      # alert when the backend web service is unreachable
      - alert: BackendDown
        expr: up{job="sphinx_backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Sphinx backend is DOWN"
          description: >
            The Sphinx backend ({{ $labels.instance }}) has been unreachable
            for more than 1 minute. Prometheus cannot scrape /metrics.

      # High error rate (5xx responses > 5 % over 5 min)
      
      - alert: HighErrorRate
        expr: >
          rate(http_requests_total{job="sphinx_backend", status=~"5.."}[5m])
          /
          rate(http_requests_total{job="sphinx_backend"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on Sphinx backend"
          description: >
            More than 5 % of requests are returning 5xx errors
            (current: {{ $value | humanizePercentage }}).

      # High P95 latency > 3 s
      - alert: HighLatency
        expr: >
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="sphinx_backend"}[5m])
          ) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on Sphinx backend"
          description: >
            P95 request latency exceeds 3 s
            (current: {{ $value | humanizeDuration }}).
